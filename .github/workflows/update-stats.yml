name: Update GitHub Stats SVG

on:
  workflow_dispatch:        # manual trigger, click "Run workflow" whenever you want a refresh
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate GitHub stats card
        uses: anuraghazra/github-readme-stats-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: Amrithasuresh
          show_icons: true
          theme: default
          output: github-stats.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg
          git diff --staged --quiet || git commit -m "Update GitHub stats"
          git push
